<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیسته‌می به‌ڕێوه‌بردنی قه‌رز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f5f7 0%, #d2d2d7 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .ios-blur {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .ios-card {
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .ios-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login Container -->
    <div class="ios-blur ios-card w-full max-w-md p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">به‌خێربێیت</h1>
            <p class="text-gray-500">بۆ به‌رده‌وامبوون چوونه‌ژووره‌وه‌ بکه‌</p>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mr-2 mb-1">ئیمێڵ</label>
                <input type="email" placeholder="example@mail.com" 
                    class="w-full px-5 py-4 ios-card bg-white/50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mr-2 mb-1">پاسوۆرد</label>
                <input type="password" placeholder="••••••••" 
                    class="w-full px-5 py-4 ios-card bg-white/50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <button type="submit" 
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold ios-card shadow-lg shadow-blue-200 transition-all">
                چوونه‌ژووره‌وه‌
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="#" class="text-sm text-blue-600 hover:underline">پاسوۆردت بیرچووه‌؟</a>
        </div>
    </div>

</body>
</html>